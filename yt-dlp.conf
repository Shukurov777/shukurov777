# ============================================================
# yt-dlp.conf — Оптимизированный конфиг для Debian 12 сервера
# Автор: Bahrullo Shukurov  |  github.com/shukurov777
# ============================================================

# ── Параллельная загрузка фрагментов ───────────────────────
# Количество одновременных фрагментов (HLS/DASH). Чем больше
# ядер CPU и пропускная способность, тем выше значение.
# Рекомендуется: 4–16
--concurrent-fragments 8

# ── Размер буфера ───────────────────────────────────────────
# Увеличиваем буфер для уменьшения системных вызовов
--buffer-size 16K

# ── HTTP-чанки ──────────────────────────────────────────────
# Принудительно скачивать чанками — помогает при throttling
--http-chunk-size 10M

# ── Повторные попытки ────────────────────────────────────────
--retries 10
--fragment-retries 10
--file-access-retries 3

# ── Таймауты ─────────────────────────────────────────────────
--socket-timeout 30

# ── Внешний загрузчик aria2c ─────────────────────────────────
# aria2c многократно быстрее встроенного загрузчика.
# Установка: sudo apt install aria2
--downloader aria2c
--downloader-args "aria2c:-x 16 -s 16 -k 1M --min-split-size=1M --max-connection-per-server=16 --allow-overwrite=true --async-dns=false"

# ── Формат — лучшее качество с минимальными пост-операциями ─
# Prefer pre-merged streams; fall back to best video+audio
--format "bv*[ext=mp4]+ba[ext=m4a]/bv*+ba/best"
--merge-output-format mp4

# ── Кодирование / ремуксинг ──────────────────────────────────
# Не перекодировать, только ремуксить (быстро)
--postprocessor-args "ffmpeg:-c copy"
--prefer-ffmpeg

# ── Файловая система ─────────────────────────────────────────
--no-mtime
--restrict-filenames

# ── Кэш ─────────────────────────────────────────────────────
--cache-dir ~/.cache/yt-dlp

# ── Сеть ─────────────────────────────────────────────────────
--no-check-certificates
--prefer-insecure

# ── Прочее ──────────────────────────────────────────────────
--no-warnings
--no-playlist
--ignore-errors
--no-part
--console-title
